<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Thumbnail Portfolio</title>
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;500;700;900&display=swap" rel="stylesheet">

<style>
html { scroll-behavior:smooth; }
body {
    margin:0;
    font-family:Poppins, sans-serif;
    background:#0f172a;
    color:white;
}
section { padding:100px 8%; }

/* HERO */
.hero {
    min-height:100vh;
    display:flex;
    align-items:center;
}
.hero-container {
    display:flex;
    justify-content:space-between;
    align-items:center;
    width:100%;
}
.hero-text { max-width:550px; }
.hero h1 {
    font-size:60px;
    font-weight:900;
}
.blue-text { color:#00bfff; }
.hero p {
    color:#cbd5e1;
    margin:20px 0;
}
.hero-image img {
    width:420px;
    border-radius:18px;
    animation:float 4s ease-in-out infinite;
    box-shadow:0 20px 40px rgba(0,0,0,0.5);
}
@keyframes float {
    0% { transform:translateY(0px); }
    50% { transform:translateY(-20px); }
    100% { transform:translateY(0px); }
}

.btn {
    padding:14px 30px;
    border-radius:40px;
    text-decoration:none;
    display:inline-block;
    font-weight:600;
    margin-right:15px;
    transition:0.3s;
}
.primary {
    background:#00bfff;
    color:black;
}
.secondary {
    border:1px solid #00bfff;
    color:#00bfff;
}
.btn:hover { transform:scale(1.05); }

/* FEATURED */
.featured-heading {
    text-align:center;
    margin-bottom:60px;
}
.featured-heading h2 {
    font-size:42px;
    font-weight:900;
}
.ctr-line {
    color:#00bfff;
    margin-top:10px;
    font-weight:600;
}
.grid {
    display:grid;
    grid-template-columns:repeat(3,1fr);
    gap:25px;
}
.grid img {
    width:100%;
    border-radius:16px;
    transition:0.3s;
}
.grid img:hover {
    transform:scale(1.07);
    box-shadow:0 0 35px rgba(0,191,255,0.8);
}

/* BEFORE AFTER SLIDER */
.before-after {
    text-align:center;
}
.slider-container {
    position:relative;
    max-width:800px;
    margin:50px auto;
    overflow:hidden;
    border-radius:18px;
}
.slider-container img {
    width:100%;
    display:block;
}
.after-image {
    position:absolute;
    top:0;
    left:0;
    width:50%;
    overflow:hidden;
}
.slider {
    position:absolute;
    top:0;
    left:50%;
    width:4px;
    height:100%;
    background:#00bfff;
    cursor:ew-resize;
}

/* RESPONSIVE */
@media(max-width:900px){
    .hero-container { flex-direction:column; text-align:center; }
    .hero-image img { width:300px; margin-top:40px; }
    .grid { grid-template-columns:repeat(2,1fr); }
}
@media(max-width:600px){
    .grid { grid-template-columns:1fr; }
    .hero h1 { font-size:38px; }
}
</style>
</head>

<body>

<!-- HERO -->
<section class="hero">
<div class="hero-container">

<div class="hero-text">
<h1>Thumbnails That Get <span class="blue-text">Clicks</span></h1>
<p>I design high converting YouTube thumbnails that increase CTR and capture attention instantly.</p>
<a href="#featured" class="btn primary">View My Work</a>
<a href="#contact" class="btn secondary">Hire Me</a>
</div>

<div class="hero-image">
<img src="https://iili.io/qJPNtft.jpg">
</div>

</div>
</section>

<!-- FEATURED -->
<section id="featured">
<div class="featured-heading">
<h2>Featured Work</h2>
<p class="ctr-line">High CTR Thumbnails That Drive Results</p>
</div>

<div class="grid">
<img src="https://iili.io/qJPNtft.jpg">
<img src="https://iili.io/qJPOxmx.jpg">
<img src="https://iili.io/qJPgAue.jpg">
<img src="https://iili.io/qJPg0FV.jpg">
<img src="https://iili.io/qJPv8hv.jpg">
<img src="https://iili.io/qJPvSQR.jpg">
</div>
</section>

<!-- BEFORE & AFTER -->
<section class="before-after">
<h2 style="font-size:40px;font-weight:900;">Before & After</h2>

<div class="slider-container" id="slider1">
<img src="https://iili.io/qdHjWs1.jpg">
<div class="after-image">
<img src="https://iili.io/qJPg0FV.jpg">
</div>
<div class="slider"></div>
</div>

</section>

<script>
const container = document.querySelector(".slider-container");
const afterImage = document.querySelector(".after-image");
const slider = document.querySelector(".slider");

let isDown = false;

slider.addEventListener("mousedown", () => isDown = true);
window.addEventListener("mouseup", () => isDown = false);

window.addEventListener("mousemove", (e) => {
    if(!isDown) return;
    let rect = container.getBoundingClientRect();
    let x = e.clientX - rect.left;
    if(x < 0) x = 0;
    if(x > rect.width) x = rect.width;
    afterImage.style.width = x + "px";
    slider.style.left = x + "px";
});
</script>

</body>
</html>
